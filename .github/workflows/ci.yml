name: CI
on: [pull_request, push]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: {POSTGRES_PASSWORD: ci, POSTGRES_DB: ci, POSTGRES_USER: ci}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci -d ci" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-only-secret
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      SUPABASE_URL: https://ci.invalid
      SUPABASE_SECRET_KEY: ci-only-storage-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.14'}
      - run: pip install -r requirements/development.txt
      - run: python backend/manage.py check --deploy
      - run: python backend/manage.py makemigrations --check --dry-run
      - run: python backend/manage.py migrate
      - run: coverage run -m django test clientes core usuarios config dashboard relatorios --settings=config.settings
      - run: coverage report --fail-under=85
      - run: python backend/manage.py collectstatic --noinput
